<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suno AI Procedural Bonsai Mind Map</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
    
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a110a;
            font-family: 'Inter', sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        /* Custom scrollbar for the prompt box */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #2d1f14; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #5a3f28; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #7c5738; }

        .glass-panel {
            background: rgba(30, 20, 15, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 180, 100, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffb366;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-shadow: 0 0 20px rgba(255, 179, 102, 0.5);
            pointer-events: none;
            transition: opacity 1s ease-out;
            z-index: 50;
        }

        .cursor-pointer { cursor: pointer !important; }
    </style>
</head>
<body>

    <div id="loading">GROWING THE BONSAI...</div>

    <!-- UI Overlay (Hidden initially) -->
    <div id="ui-layer" class="absolute inset-0 pointer-events-none flex flex-col justify-between p-6 z-10 opacity-0 transition-opacity duration-500">
        
        <!-- Top HUD -->
        <div class="flex justify-between items-start w-full max-w-7xl mx-auto">
            <div class="glass-panel p-4 rounded-2xl pointer-events-auto">
                <h1 class="text-2xl font-bold text-orange-200 tracking-wide mb-1">Suno AI Mind Map</h1>
                <p class="text-sm text-orange-400/70">16-Bit Quirky & Odd Compositions</p>
                <div class="mt-2 text-xs text-orange-300/50 flex items-center gap-2">
                    <span class="inline-block w-2 h-2 rounded-full bg-orange-400 animate-pulse"></span>
                    Interact with glowing leaves
                </div>
            </div>

            <button id="btn-reset" class="glass-panel px-6 py-3 rounded-xl text-orange-200 font-semibold hover:bg-orange-900/40 hover:text-white transition-all pointer-events-auto transform hover:scale-105 active:scale-95 hidden">
                ← Zoom Out
            </button>
        </div>

        <!-- Prompt Details Box (Center right) -->
        <div id="prompt-panel" class="absolute top-1/2 right-8 -translate-y-1/2 w-[400px] glass-panel rounded-2xl p-6 pointer-events-auto transform translate-x-[120%] transition-transform duration-500 ease-out flex flex-col gap-4">
            
            <div class="border-b border-orange-500/20 pb-4">
                <div id="prompt-path" class="text-xs text-orange-400/60 uppercase tracking-widest font-semibold mb-2">Category > Sub > Branch</div>
                <h2 class="text-xl font-bold text-orange-100 leading-tight">Generated Prompt</h2>
            </div>

            <div class="relative group">
                <textarea id="prompt-text" class="w-full h-48 bg-black/40 border border-orange-500/30 rounded-xl p-4 text-orange-50 text-sm font-mono leading-relaxed resize-none focus:outline-none focus:border-orange-500/60 transition-colors" readonly></textarea>
            </div>

            <div class="flex gap-3 mt-2">
                <button id="btn-copy" class="flex-1 bg-gradient-to-r from-orange-600 to-amber-600 text-white font-medium py-3 px-4 rounded-xl shadow-lg hover:shadow-orange-500/20 hover:from-orange-500 hover:to-amber-500 transition-all active:scale-95 flex justify-center items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                    Copy Prompt
                </button>
                <button id="btn-generate-new" class="flex-none bg-orange-950/50 border border-orange-700/50 text-orange-200 p-3 rounded-xl hover:bg-orange-900/60 transition-all active:scale-95" title="Regenerate this leaf's prompt">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                </button>
            </div>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, controls;
        let leavesGroup = new THREE.Group();
        let raycaster = new THREE.Raycaster();
        let mouse = new THREE.Vector2();
        
        let initialCameraPos = new THREE.Vector3(60, 45, 60);
        let initialControlsTarget = new THREE.Vector3(0, 15, 0);
        
        let activeLeaf = null;
        let hoveredLeaf = null;
        let hearthLight = null;

        // Data generation dictionaries
        const DATA = {
            categories: [
                "16-bit Orchestral Folk", "Chiptune Jazz & Blues", "Arcade Punk Grunge",
                "Synthwave Bossa Nova", "Pixelated Psychedelic", "Glitch Hop Gothic",
                "Retro-Futurist Funk", "Cyber-Baroque Classical", "Lo-Fi Bit-Crushed Metal",
                "8-Bit Ambient Drone"
            ],
            subCategories: ["Cozy Warm Vibes", "Chaotic Wild Energy", "Dreamy Melancholy", "Aggressive Dark Drive", "Quirky Oddball"],
            branches: ["140+ BPM Fast Paced", "90-120 BPM Mid-Tempo Groove", "60-85 BPM Slow & Melodic"],
            vocals: ["clean british female vocals", "robotic vocoder harmonies", "breathy whisper verse", "growling chiptune synth-voice", "ethereal choir samples", "dry busker delivery", "8-bit sampled shouts", "operatic soprano glitch", "kazoo-like hums", "auto-tuned folk singing"],
            instruments: ["square wave solo", "FM synth comping", "acoustic guitar picking", "plucked harp accents", "heavy saw bass", "mandolin tremolo", "kazoo countermelody", "upright bass walking line", "16-bit violin sonata", "overdriven gameboy lead", "toy piano chords", "synthesized flute"],
            percussion: ["brushed snare groove", "bit-crushed blast beats", "TR-808 cowbell loop", "sampled glass breaking percussion", "heavy vinyl crackle beats", "glitchy trap hi-hats", "djembe mixed with white noise", "marching band snare in 8-bit", "typewriter clicking rhythms", "sub-bass kick drops"],
            quirks: ["sudden tempo shifts", "odd time signature (7/8)", "unexpected kazoo drop", "bittersweet resolution", "dynamic verse chorus lift", "video game level-up sound integration", "boss fight tension build", "pause-menu elevator music break", "retro commercial jingle vibe", "random animal crossing speech samples"],
            production: ["plate reverb chorus", "dry acoustic mix", "cassette tape warp", "vintage console compression", "underwater low-pass filter", "extreme stereo panning", "room mic cozy bleed", "lo-fi AM radio EQ", "over-compressed sidechain pumping", "crystal clear modern master"]
        };

        // Palettes for categories (Warm, cozy, magical)
        const leafColors = [
            0xff4500, // Orange Red
            0xff8c00, // Dark Orange
            0xffa500, // Orange
            0xffd700, // Gold
            0xda9100, // Goldenrod
            0xcd853f, // Peru
            0xd2691e, // Chocolate
            0x8b4513, // SaddleBrown
            0xc04000, // Mahogany
            0xff6347  // Tomato
        ];

        function getRandom(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function generatePromptString(catIndex, subIndex, branchIndex) {
            const cat = DATA.categories[catIndex];
            const sub = DATA.subCategories[subIndex];
            const branch = DATA.branches[branchIndex];
            
            return `${cat}, ${sub}, ${branch}, ${getRandom(DATA.vocals)}, ${getRandom(DATA.instruments)}, ${getRandom(DATA.instruments)}, ${getRandom(DATA.percussion)}, ${getRandom(DATA.quirks)}, ${getRandom(DATA.production)}, highly detailed, emotional impact.`;
        }

        function init() {
            const container = document.getElementById('canvas-container');

            // Scene setup
            scene = new THREE.Scene();
            // Cozy dark warm background
            scene.background = new THREE.Color(0x150e09); 
            // Thick fog for the blurry background depth effect
            scene.fog = new THREE.FogExp2(0x150e09, 0.012);

            // Camera setup
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.copy(initialCameraPos);

            // Renderer setup
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            // Warm tone mapping
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            container.appendChild(renderer.domElement);

            // Controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.target.copy(initialControlsTarget);
            controls.maxDistance = 150;
            controls.maxPolarAngle = Math.PI / 2 + 0.1; // Don't go too far below table

            buildEnvironment();
            buildBonsaiTree();
            setupLighting();

            scene.add(leavesGroup);

            // Event Listeners
            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('click', onClick);
            
            document.getElementById('btn-reset').addEventListener('click', resetCamera);
            document.getElementById('btn-copy').addEventListener('click', copyPrompt);
            document.getElementById('btn-generate-new').addEventListener('click', regenerateCurrentLeafPrompt);

            // Remove loading screen
            setTimeout(() => {
                document.getElementById('loading').style.opacity = '0';
                document.getElementById('ui-layer').classList.remove('opacity-0');
            }, 1000);

            animate();
        }

        function buildEnvironment() {
            // Materials
            const woodMat = new THREE.MeshStandardMaterial({ color: 0x3d2314, roughness: 0.9, flatShading: true });
            const sofaMat = new THREE.MeshStandardMaterial({ color: 0x1c2b21, roughness: 0.8, flatShading: true });
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x0f0a07, roughness: 1.0 });
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x120d0a, roughness: 1.0 });

            // Floor
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.position.y = -20; // Table height is 20
            floor.receiveShadow = true;
            scene.add(floor);

            // Walls (to catch some warm light)
            const wallBack = new THREE.Mesh(new THREE.PlaneGeometry(200, 100), wallMat);
            wallBack.position.set(0, 30, -80);
            wallBack.receiveShadow = true;
            scene.add(wallBack);

            // Table
            const tableGroup = new THREE.Group();
            
            // Table top
            const tableTop = new THREE.Mesh(new THREE.CylinderGeometry(25, 25, 2, 32), woodMat);
            tableTop.position.y = -1;
            tableTop.receiveShadow = true;
            tableGroup.add(tableTop);
            
            // Table legs
            const legGeom = new THREE.CylinderGeometry(1.5, 1, 19, 8);
            const legPositions = [
                [15, -10.5, 15], [-15, -10.5, 15], [15, -10.5, -15], [-15, -10.5, -15]
            ];
            legPositions.forEach(pos => {
                const leg = new THREE.Mesh(legGeom, woodMat);
                leg.position.set(pos[0], pos[1], pos[2]);
                leg.castShadow = true;
                tableGroup.add(leg);
            });
            
            scene.add(tableGroup);

            // Low poly Sofa (blurry background object)
            const sofaGroup = new THREE.Group();
            const seat = new THREE.Mesh(new THREE.BoxGeometry(60, 10, 25), sofaMat);
            seat.position.set(30, -15, -45);
            const backrest = new THREE.Mesh(new THREE.BoxGeometry(60, 20, 8), sofaMat);
            backrest.position.set(30, -5, -53);
            sofaGroup.add(seat, backrest);
            // Rotate slightly for casual placement
            sofaGroup.rotation.y = -0.2;
            scene.add(sofaGroup);

            // Window simulating night outside
            const windowGeom = new THREE.BoxGeometry(40, 30, 2);
            const windowMat = new THREE.MeshStandardMaterial({ 
                color: 0x051020, 
                emissive: 0x051020, 
                emissiveIntensity: 0.5 
            });
            const windowMesh = new THREE.Mesh(windowGeom, windowMat);
            windowMesh.position.set(-50, 10, -78);
            scene.add(windowMesh);
        }

        function setupLighting() {
            // Very dim ambient light
            const ambient = new THREE.AmbientLight(0xffeedd, 0.2);
            scene.add(ambient);

            // Warm cozy lamp light right above the tree
            const pointLight = new THREE.PointLight(0xffaa55, 1.5, 150);
            pointLight.position.set(10, 40, 10);
            pointLight.castShadow = true;
            pointLight.shadow.mapSize.width = 1024;
            pointLight.shadow.mapSize.height = 1024;
            pointLight.shadow.bias = -0.001;
            scene.add(pointLight);

            // Hearth / Fireplace flickering light near the sofa
            hearthLight = new THREE.PointLight(0xff4411, 2.0, 200);
            hearthLight.position.set(40, -10, -40);
            hearthLight.castShadow = true;
            scene.add(hearthLight);

            // Subtle blue light from the window
            const windowLight = new THREE.PointLight(0x4466ff, 0.8, 100);
            windowLight.position.set(-45, 10, -70);
            scene.add(windowLight);
        }

        function buildBonsaiTree() {
            const trunkMat = new THREE.MeshStandardMaterial({ 
                color: 0x2e1a0d, 
                roughness: 1.0, 
                flatShading: true 
            });

            // Base Trunk - Taller and segmented for bark deformation
            const trunkHeight = 22;
            const trunkRadiusBase = 3.5;
            const trunkRadiusTop = 1.8;
            const trunkGeom = new THREE.CylinderGeometry(trunkRadiusTop, trunkRadiusBase, trunkHeight, 7, 5);
            
            // Deform trunk for bark look
            deformGeometry(trunkGeom, trunkRadiusBase, trunkHeight);
            trunkGeom.translate(0, trunkHeight / 2, 0);

            const trunk = new THREE.Mesh(trunkGeom, trunkMat);
            trunk.castShadow = true;
            trunk.receiveShadow = true;
            scene.add(trunk);

            // Start recursive branching along the trunk (not just the very top)
            const numCats = DATA.categories.length; // 10
            const goldenAngle = 2.39996; // Spiral distribution

            for (let i = 0; i < numCats; i++) {
                
                const heightRatio = i / (numCats - 1); // 0 to 1
                // Distribute branches along the upper 75% of the trunk
                const yOffset = trunkHeight * 0.25 + (heightRatio * trunkHeight * 0.75);
                
                const rootNode = new THREE.Group();
                rootNode.position.y = yOffset;
                trunk.add(rootNode);

                // Spread in a spiral around the trunk
                const angleY = i * goldenAngle;
                
                // Lower branches point out more, upper branches point up more to avoid colliding and stay high
                const angleZ = (Math.PI / 2.4) - (heightRatio * 0.5) + (Math.random() * 0.2 - 0.1); 
                
                const len = 15 + Math.random() * 5 - (heightRatio * 4);
                const rBase = trunkRadiusTop * (0.8 - heightRatio * 0.2);
                const rTop = rBase * 0.6;

                const catGroup = createBranch(rootNode, len, rBase, rTop, angleY, angleZ, trunkMat);
                
                // Add a slight upward curve
                catGroup.rotation.z -= 0.2;

                // Level 2: Sub-categories
                const numSubs = DATA.subCategories.length; // 5
                for (let j = 0; j < numSubs; j++) {
                    
                    const subAngleY = ((j - (numSubs/2)) * 0.6) + (Math.random() * 0.2);
                    const subAngleZ = 0.15 + (Math.random() * 0.25); // Point upwards relative to parent
                    
                    const subLen = 9 + Math.random() * 4;
                    const subRBase = rTop * 0.8;
                    const subRTop = subRBase * 0.6;

                    const subGroup = createBranch(catGroup, subLen, subRBase, subRTop, subAngleY, subAngleZ, trunkMat);

                    // Level 3: Branches
                    const numBranches = DATA.branches.length; // 3
                    for (let k = 0; k < numBranches; k++) {
                        
                        const branchAngleY = ((k - 1) * 0.8) + (Math.random() * 0.4);
                        const branchAngleZ = 0.1 + (Math.random() * 0.3); // Safe upward angle
                        
                        const branchLen = 5 + Math.random() * 3;
                        const branchRBase = subRTop * 0.8;
                        const branchRTop = branchRBase * 0.5;

                        const branchGroup = createBranch(subGroup, branchLen, branchRBase, branchRTop, branchAngleY, branchAngleZ, trunkMat);

                        // Level 4: Prompts / Leaves
                        createLeaves(branchGroup, i, j, k, 10);
                    }
                }
            }
        }

        // Helper to perturb vertices for a knobby, organic bark look
        function deformGeometry(geom, radiusBase, length) {
            const pos = geom.attributes.position;
            for(let i=0; i<pos.count; i++) {
                const y = pos.getY(i);
                // Only deform middle vertices to keep branch joints relatively seamless
                if (Math.abs(y) < (length / 2) - 0.5) {
                    const angle = Math.atan2(pos.getZ(i), pos.getX(i));
                    // Add random displacement based on radius size
                    const radiusDistortion = (Math.random() - 0.5) * (radiusBase * 0.5); 
                    pos.setX(i, pos.getX(i) + Math.cos(angle) * radiusDistortion);
                    pos.setZ(i, pos.getZ(i) + Math.sin(angle) * radiusDistortion);
                }
            }
            geom.computeVertexNormals(); // Recalculate for flat shading
        }

        function createBranch(parentGroup, length, radiusBase, radiusTop, angleY, angleZ, material) {
            const pivotGroup = new THREE.Group();
            pivotGroup.rotation.y = angleY;
            pivotGroup.rotation.z = angleZ;
            
            // More segments (6 radial, 3 height) to allow middle deformation
            const geom = new THREE.CylinderGeometry(radiusTop, radiusBase, length, 6, 3);
            
            // Deform for bark texture
            deformGeometry(geom, radiusBase, length);
            
            geom.translate(0, length / 2, 0); 
            
            const mesh = new THREE.Mesh(geom, material);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            pivotGroup.add(mesh);

            const endPointGroup = new THREE.Group();
            endPointGroup.position.y = length;
            pivotGroup.add(endPointGroup);

            parentGroup.add(pivotGroup);
            return endPointGroup;
        }

        function createLeaves(parentGroup, catIndex, subIndex, branchIndex, count) {
            // Assign color based on Main Category to give visual clustering
            const colorHex = leafColors[catIndex % leafColors.length];
            const leafMat = new THREE.MeshStandardMaterial({
                color: colorHex,
                emissive: colorHex,
                emissiveIntensity: 0.4, // Soft glow
                roughness: 0.4,
                flatShading: true
            });

            const leafGeom = new THREE.IcosahedronGeometry(0.8, 0); // Low poly sphere

            for(let i=0; i<count; i++) {
                const leaf = new THREE.Mesh(leafGeom, leafMat);
                
                // Clustered position around the branch end
                leaf.position.set(
                    (Math.random() - 0.5) * 3,
                    (Math.random() - 0.5) * 3,
                    (Math.random() - 0.5) * 3
                );
                
                leaf.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
                
                // Store metadata for the UI
                leaf.userData = {
                    isLeaf: true,
                    catIndex: catIndex,
                    subIndex: subIndex,
                    branchIndex: branchIndex,
                    prompt: generatePromptString(catIndex, subIndex, branchIndex),
                    path: `${DATA.categories[catIndex]} > ${DATA.subCategories[subIndex]} > ${DATA.branches[branchIndex]}`,
                    baseColor: colorHex
                };

                parentGroup.add(leaf);
                // We add to a global group for efficient raycasting
                // Since parentGroup matrix handles world position, we keep it in the scene graph logically,
                // but raycaster needs to know about it. We will just add the leaf to an array.
                leavesGroup.add(leaf.clone()); // Wait, cloning breaks parent transform.
                // Better approach: just push the actual leaf to an array for raycasting.
            }
        }
        
        // We need an array of all leaf meshes for the raycaster
        let raycastTargets = [];
        // Delay collecting targets until tree is built
        setTimeout(() => {
            scene.traverse(child => {
                if(child.isMesh && child.userData.isLeaf) {
                    raycastTargets.push(child);
                }
            });
        }, 100);


        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(raycastTargets);

            if (intersects.length > 0) {
                document.body.classList.add('cursor-pointer');
                const object = intersects[0].object;
                
                if (hoveredLeaf !== object) {
                    // Reset previously hovered leaf if it's not the active one
                    if (hoveredLeaf && hoveredLeaf !== activeLeaf) {
                        hoveredLeaf.material.emissiveIntensity = 0.4;
                        hoveredLeaf.scale.set(1, 1, 1);
                    }
                    
                    hoveredLeaf = object;
                    
                    // Light up and scale up the newly hovered leaf
                    if (hoveredLeaf !== activeLeaf) {
                        hoveredLeaf.material.emissiveIntensity = 0.9;
                        hoveredLeaf.scale.set(1.4, 1.4, 1.4);
                    }
                }
            } else {
                document.body.classList.remove('cursor-pointer');
                
                // Reset hover state when moving off leaves
                if (hoveredLeaf && hoveredLeaf !== activeLeaf) {
                    hoveredLeaf.material.emissiveIntensity = 0.4;
                    hoveredLeaf.scale.set(1, 1, 1);
                }
                hoveredLeaf = null;
            }
        }

        function onClick(event) {
            // Ignore clicks on UI elements
            if(event.target.closest('#prompt-panel') || event.target.closest('.glass-panel')) return;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(raycastTargets);

            if (intersects.length > 0) {
                const object = intersects[0].object;
                focusOnLeaf(object);
            }
        }

        function focusOnLeaf(leaf) {
            activeLeaf = leaf;
            
            // Get world position of the leaf
            const targetPos = new THREE.Vector3();
            leaf.getWorldPosition(targetPos);

            // Calculate new camera position (zoomed in, slightly offset)
            const camOffset = new THREE.Vector3(5, 3, 5);
            const newCamPos = targetPos.clone().add(camOffset);

            // Highlight leaf (boost emissive)
            raycastTargets.forEach(l => {
                l.material.emissiveIntensity = 0.4;
                l.scale.set(1, 1, 1);
            }); 
            
            leaf.material.emissiveIntensity = 1.0;
            leaf.scale.set(1.5, 1.5, 1.5);

            // Tween Camera Position
            new TWEEN.Tween(camera.position)
                .to({ x: newCamPos.x, y: newCamPos.y, z: newCamPos.z }, 1200)
                .easing(TWEEN.Easing.Cubic.InOut)
                .start();

            // Tween Controls Target (look at leaf)
            new TWEEN.Tween(controls.target)
                .to({ x: targetPos.x, y: targetPos.y, z: targetPos.z }, 1200)
                .easing(TWEEN.Easing.Cubic.InOut)
                .start();

            // Update UI
            document.getElementById('prompt-path').innerText = leaf.userData.path;
            document.getElementById('prompt-text').value = leaf.userData.prompt;
            
            // Show UI
            document.getElementById('prompt-panel').classList.remove('translate-x-[120%]');
            document.getElementById('btn-reset').classList.remove('hidden');
        }

        function resetCamera() {
            // Hide UI
            document.getElementById('prompt-panel').classList.add('translate-x-[120%]');
            document.getElementById('btn-reset').classList.add('hidden');

            // Reset highlighted leaf
            if(activeLeaf) {
                activeLeaf.material.emissiveIntensity = 0.4;
                activeLeaf.scale.set(1, 1, 1);
                activeLeaf = null;
            }
            
            // Just in case hover state got stuck
            hoveredLeaf = null;

            // Tween back to start
            new TWEEN.Tween(camera.position)
                .to({ x: initialCameraPos.x, y: initialCameraPos.y, z: initialCameraPos.z }, 1500)
                .easing(TWEEN.Easing.Cubic.InOut)
                .start();

            new TWEEN.Tween(controls.target)
                .to({ x: initialControlsTarget.x, y: initialControlsTarget.y, z: initialControlsTarget.z }, 1500)
                .easing(TWEEN.Easing.Cubic.InOut)
                .start();
        }

        function copyPrompt() {
            const text = document.getElementById('prompt-text').value;
            const btn = document.getElementById('btn-copy');
            
            // Try modern clipboard API, fallback to execCommand
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(showCopiedFeedback);
            } else {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.left = "-999999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    document.execCommand('copy');
                    showCopiedFeedback();
                } catch (err) {
                    console.error('Fallback: Oops, unable to copy', err);
                }
                document.body.removeChild(textArea);
            }

            function showCopiedFeedback() {
                const originalHtml = btn.innerHTML;
                btn.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> Copied!`;
                btn.classList.add('from-green-600', 'to-emerald-600');
                setTimeout(() => {
                    btn.innerHTML = originalHtml;
                    btn.classList.remove('from-green-600', 'to-emerald-600');
                }, 2000);
            }
        }

        function regenerateCurrentLeafPrompt() {
            if(!activeLeaf) return;
            const d = activeLeaf.userData;
            const newPrompt = generatePromptString(d.catIndex, d.subIndex, d.branchIndex);
            activeLeaf.userData.prompt = newPrompt;
            
            // Animate text area update
            const textArea = document.getElementById('prompt-text');
            textArea.style.opacity = '0';
            setTimeout(() => {
                textArea.value = newPrompt;
                textArea.style.opacity = '1';
            }, 200);

            // Small pop animation on the leaf
            const originalScale = activeLeaf.scale.clone();
            new TWEEN.Tween(activeLeaf.scale)
                .to({ x: 1.5, y: 1.5, z: 1.5 }, 150)
                .yoyo(true).repeat(1)
                .onComplete(() => activeLeaf.scale.copy(originalScale))
                .start();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate(time) {
            requestAnimationFrame(animate);
            TWEEN.update(time);
            
            // Hearth Light Flickering Effect
            if (hearthLight) {
                const now = Date.now() * 0.003;
                // Complex wave for realistic flickering
                hearthLight.intensity = 1.8 + Math.sin(now) * 0.3 + Math.sin(now * 2.5) * 0.2 + Math.random() * 0.2;
                // Subtle position jitter to make shadows dance
                hearthLight.position.x = 40 + Math.sin(now * 1.5) * 0.5;
                hearthLight.position.z = -40 + Math.cos(now * 1.2) * 0.5;
            }

            // Slow dramatic rotation of the scene for a "magical" ambient feel
            // Only rotate if not zoomed in
            if(!activeLeaf) {
                scene.rotation.y += 0.0005;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        // Start application
        window.onload = init;
    </script>
</body>
</html>
